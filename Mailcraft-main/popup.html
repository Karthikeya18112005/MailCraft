<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MailCraft AI</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup">

    <header class="popup-header">
      <div class="popup-logo">
        <span class="popup-spark">✦</span>
        <span class="popup-name">Mail<b>Craft</b></span>
      </div>
      <div class="popup-version">v1.0</div>
    </header>

    <div class="popup-status" id="popup-status">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Checking Ollama…</span>
    </div>

    <div class="popup-section">
      <div class="popup-label">Colour theme</div>
      <div class="popup-dots" id="popup-dots">
        <button class="pop-dot" data-theme="clay"   style="background:#beb19e" title="Clay"></button>
        <button class="pop-dot" data-theme="stone"  style="background:#ccc9c2" title="Stone"></button>
        <button class="pop-dot" data-theme="moss"   style="background:#9aaa8a" title="Moss"></button>
        <button class="pop-dot" data-theme="mist"   style="background:#b8c8cc" title="Mist"></button>
        <button class="pop-dot" data-theme="dusk"   style="background:#b0a8c8" title="Dusk"></button>
        <button class="pop-dot" data-theme="sakura" style="background:#d8b8b8" title="Sakura"></button>
        <button class="pop-dot" data-theme="ink"    style="background:#2a2824" title="Ink"></button>
      </div>
      <div class="popup-theme-name" id="popup-theme-name">Clay</div>
    </div>

    <div class="popup-section">
      <div class="popup-label">Type style</div>
      <div class="popup-fonts" id="popup-fonts">
        <button class="pop-font" data-font="sans">Clean</button>
        <button class="pop-font" data-font="serif">Serif</button>
        <button class="pop-font" data-font="mono">Mono</button>
      </div>
    </div>

    <div class="popup-section">
      <div class="popup-label">Ollama model</div>
      <input class="popup-input" id="popup-model" type="text" value="mailcraft" placeholder="model name" />
    </div>

    <div class="popup-section">
      <div class="popup-label">Ollama URL</div>
      <input class="popup-input" id="popup-url" type="text" value="http://localhost:11434" placeholder="http://localhost:11434" />
    </div>

    <div class="popup-footer">
      <button class="popup-save" id="popup-save">Save settings</button>
      <a class="popup-link" href="https://github.com/yourrepo/mailcraft" target="_blank">Docs ↗</a>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
